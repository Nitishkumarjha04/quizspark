<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="app">
  <nav id="navbar" class="navbar hidden">
    <a href="/" class="nav-logo" data-link>⚡ QuizSpark</a>
    <div class="nav-links">
      <a href="/explore" data-link>Explore</a>
      <a href="/dashboard" data-link id="nav-dashboard" class="hidden">Dashboard</a>
    </div>
    <div class="nav-auth">
      <div id="nav-guest">
        <a href="/login" class="btn-outline-sm" data-link>Log in</a>
        <a href="/register" class="btn-primary-sm" data-link>Sign up</a>
      </div>
      <div id="nav-user" class="hidden">
        <a href="/quiz/new" class="btn-primary-sm" data-link>+ Create quiz</a>
        <div class="nav-avatar" id="nav-avatar-btn">
          <span id="nav-username"></span>
          <div class="nav-dropdown" id="nav-dropdown">
            <a href="/dashboard" data-link>My quizzes</a>
            <a href="/profile" data-link>Profile</a>
            <button id="logout-btn">Log out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main id="view"></main>

  <div id="toast-container"></div>
</div>

<script src="/config.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/router.js"></script>
<script src="/js/toast.js"></script>
<script src="/js/pages/home.js"></script>
<script src="/js/pages/login.js"></script>
<script src="/js/pages/register.js"></script>
<script src="/js/pages/explore.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/quiz-builder.js"></script>
<script src="/js/pages/quiz-preview.js"></script>
<script src="/js/pages/room-host.js"></script>
<script src="/js/pages/room-player.js"></script>
<script src="/js/pages/room-join.js"></script>
<script src="/js/pages/results.js"></script>
<script src="/js/pages/profile.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
